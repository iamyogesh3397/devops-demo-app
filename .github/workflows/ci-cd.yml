name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Debug secret presence
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]; then echo "USERNAME MISSING"; else echo "USERNAME OK"; fi
          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then echo "TOKEN MISSING"; else echo "TOKEN OK"; fi
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-demo-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-demo-app:${{ github.sha }}
